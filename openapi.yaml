openapi: 3.1.0
info:
  title: mtui HTTP API
  description: |
    HTTP API exposed by MTUI for reading and writing Modbus
    registers on the currently connected device, plus a health probe.

    The server binds to `0.0.0.0` on a configurable port and proxies requests
    to the live Modbus device backing the TUI. When no device is connected,
    register operations return `503 Service Unavailable`.
  version: 0.2.1
  license:
    name: See repository

servers:
  - url: http://{host}:{port}
    description: mtui API server
    variables:
      host:
        default: localhost
      port:
        default: "8080"
        description: Configured API port (set in mtui; 0 selects an ephemeral port)

paths:
  /read:
    post:
      summary: Read registers or bits
      description: |
        Reads `count` items of the given `type` starting at `address` from the
        connected device. `Holding` and `Input` return raw 16-bit values;
        `Coil` and `Discrete` return `0` or `1` per bit.

        An optional `slave_id` targets a specific Modbus slave/unit for this
        request only; the device's configured slave is restored afterwards.
        When omitted, the configured slave is used. Specifying `slave_id`
        requires the "API slave id override" setting to be enabled; otherwise
        the request is rejected with `403`.
      operationId: readRegisters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReadRequest"
            examples:
              holdings:
                summary: Read 4 holding registers from address 0
                value:
                  type: Holding
                  address: 0
                  count: 4
              coils:
                summary: Read 8 coils from address 0
                value:
                  type: Coil
                  address: 0
                  count: 8
              slave:
                summary: Read 2 holding registers from slave 5
                value:
                  type: Holding
                  address: 0
                  count: 2
                  slave_id: 5
      responses:
        "200":
          description: Values read successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadResponse"
              examples:
                registers:
                  summary: Holding/Input register values
                  value:
                    values: [230, 0, 4998, 12]
                bits:
                  summary: Coil/Discrete values (0 or 1)
                  value:
                    values: [1, 1, 1, 1, 0, 1, 1, 0]
        "403":
          description: |
            A `slave_id` was specified but the "API slave id override" setting
            is disabled.
        "503":
          description: No device is currently connected
        "502":
          description: The device read failed (Modbus / transport error)

  /write:
    post:
      summary: Write registers or coils
      description: |
        Writes one or more consecutive items starting at `address`. The
        `type` selects `Holding` (16-bit registers) or
        `Coil` (bits, where `0` is off and any non-zero value is on).
        Read-only types (`Input`, `Discrete`) are rejected with `400`, and
        all writes are rejected with `403` when the server is in read-only
        mode.

        An optional `slave_id` targets a specific Modbus slave/unit for this
        request only; the device's configured slave is restored afterwards.
        When omitted, the configured slave is used. Specifying `slave_id`
        requires the "API slave id override" setting to be enabled; otherwise
        the request is rejected with `403`.
      operationId: writeRegisters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WriteRequest"
            examples:
              single:
                summary: Write one holding register (type defaults to Holding)
                value:
                  address: 40001
                  values: [1234]
              multiple:
                summary: Write three consecutive holding registers
                value:
                  type: Holding
                  address: 40001
                  values: [1234, 5678, 9012]
              coils:
                summary: Write three consecutive coils (on, off, on)
                value:
                  type: Coil
                  address: 0
                  values: [1, 0, 1]
              slave:
                summary: Write one holding register to slave 5
                value:
                  type: Holding
                  address: 40001
                  values: [1234]
                  slave_id: 5
      responses:
        "204":
          description: Values written successfully (no body)
        "400":
          description: The requested type is read-only (Input or Discrete)
        "403":
          description: |
            The write is forbidden: the server is in read-only mode, or a
            `slave_id` was specified while the "API slave id override" setting
            is disabled.
        "503":
          description: No device is currently connected
        "502":
          description: The device write failed (Modbus / transport error)

  /health:
    get:
      summary: Health probe
      description: |
        Reports server health. Returns `200` only when a device is present and
        its connection status is serving (`unknown`, `reading`, or
        `connected`); otherwise `503` with the same body.
      operationId: health
      responses:
        "200":
          description: Device present and serving
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                connected:
                  value:
                    status: connected
                    device_present: true
                    read_only: false
        "503":
          description: No device present, or status is not serving
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                disconnected:
                  value:
                    status: error
                    device_present: false
                    read_only: false

components:
  schemas:
    RegisterType:
      type: string
      description: |
        Modbus data class. `Holding` (16-bit, read/write) and `Input` (16-bit,
        read-only) are register types; `Coil` (1-bit, read/write) and
        `Discrete` (1-bit, read-only) are bit types. Reads of bit types return
        `0` or `1` per item.
      enum:
        - Holding
        - Input
        - Coil
        - Discrete

    ReadRequest:
      type: object
      required: [type, address, count]
      properties:
        type:
          $ref: "#/components/schemas/RegisterType"
        address:
          type: integer
          format: uint16
          minimum: 0
          maximum: 65535
          description: Starting register address.
        count:
          type: integer
          format: uint16
          minimum: 0
          maximum: 65535
          description: Number of registers to read.
        slave_id:
          type: integer
          format: uint8
          minimum: 0
          maximum: 255
          description: |
            Modbus slave/unit id to target for this request only. Defaults to
            the device's configured slave when omitted. Requires the "API slave
            id override" setting to be enabled; a request that sets this while
            the setting is disabled is rejected with `403`.

    ReadResponse:
      type: object
      required: [values]
      properties:
        values:
          type: array
          description: |
            Values in address order: raw 16-bit for `Holding`/`Input`, or
            `0`/`1` for `Coil`/`Discrete`.
          items:
            type: integer
            format: uint16
            minimum: 0
            maximum: 65535

    WriteRequest:
      type: object
      required: [address, values]
      properties:
        type:
          allOf:
            - $ref: "#/components/schemas/RegisterType"
          default: Holding
          description: |
            Target data class. Defaults to `Holding` when omitted. Only
            `Holding` and `Coil` are writable; `Input` and `Discrete` are
            rejected with `400`.
        address:
          type: integer
          format: uint16
          minimum: 0
          maximum: 65535
          description: Starting address.
        values:
          type: array
          description: |
            Values to write to consecutive items. For coils, `0` is off and
            any non-zero value is on.
          items:
            type: integer
            format: uint16
            minimum: 0
            maximum: 65535
        slave_id:
          type: integer
          format: uint8
          minimum: 0
          maximum: 255
          description: |
            Modbus slave/unit id to target for this request only. Defaults to
            the device's configured slave when omitted. Requires the "API slave
            id override" setting to be enabled; a request that sets this while
            the setting is disabled is rejected with `403`.

    HealthResponse:
      type: object
      required: [status, device_present, read_only]
      properties:
        status:
          type: string
          description: Connection status label.
          enum:
            - unknown
            - reading
            - connected
            - reconnecting
            - error
        device_present:
          type: boolean
          description: Whether a Modbus device is currently connected.
        read_only:
          type: boolean
          description: Whether the server rejects writes.
