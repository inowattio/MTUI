<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTUI &mdash; browser demo</title>
  <link data-trunk rel="rust" data-bin="mtui-web" data-cargo-features="web" />
  <style>
    html {
      height: 100%;
    }
    body {
      height: 100%;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      align-content: center;
      background-color: #121212;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    pre {
      font-family: "Fira Code", monospace;
      font-size: 16px;
      margin: 0;
    }
  </style>
</head>
<body>
  <noscript>
    <div style="font-family: sans-serif; padding: 2rem; text-align: center;">
      <h1>⚠️ JavaScript is disabled</h1>
      <p>This website requires JavaScript and WebAssembly to function properly.</p>
    </div>
  </noscript>
  <script>
    if (typeof WebAssembly === "undefined") {
      document.body.innerHTML = `
        <div style="font-family: sans-serif; padding: 2rem; text-align: center;">
          <h1>⚠️ Your browser does not support WebAssembly</h1>
          <p>This website requires WebAssembly to run. Please use a modern browser (Chrome, Firefox, Safari, or Edge) and make sure WebAssembly is enabled.</p>
        </div>
      `;
      throw new Error("WebAssembly not supported");
    }
  </script>
</body>
</html>
