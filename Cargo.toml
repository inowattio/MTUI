[package]
name = "modbus-viewer"
version = "0.1.0"
edition = "2021"

[dependencies]
color-eyre = "0.6.2"
crossterm = { version = "0.27.0", features = ["event-stream"] }
ratatui = "0.26.0-alpha.2"
tokio = { version = "1.32.0", features = ["full"] }
futures = "0.3.28"
tokio-util = "0.7.9"
serde = { version = "1.0.195", features = ["derive"] }

tokio-modbus = { version = "0.10.0", default-features = false, features = ["rtu", "tcp"] } # device
tokio-serial = { version = "5.4.4" }
async-trait = "0.1.77"

anyhow = "1.0.79"
serde_json = "1.0.111"
